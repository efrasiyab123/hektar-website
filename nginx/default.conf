server {
    listen 3007;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # İç ağ (NPM → container hostname) ve gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/css text/plain application/javascript image/svg+xml;

    # Basit güvenlik (statik site)
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
